<div class="container mt-4" *ngIf="patient; else loading">
  <h2 class="text-primary mb-4">Patient Profile</h2>
  <div class="card shadow-sm">
    <div class="card-body">
      <p><strong>Patient ID:</strong> {{ patient.id }}</p>
      <p><strong>Name:</strong> {{ patient.name }}</p>
      <p><strong>Email:</strong> {{ patient.email }}</p>
      <button class="btn btn-warning mt-3" (click)="updatePassword()">Update/Reset Password</button>
    </div>
  </div>
</div>

<ng-template #loading>
  <p class="text-muted">Loading patient profile...</p>
</ng-template>
