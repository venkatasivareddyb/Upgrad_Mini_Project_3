<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white text-center">
          <h4>Signup</h4>
        </div>
        <div class="card-body">
          <form (ngSubmit)="submit()" #registerForm="ngForm">

            <!-- Name -->
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" [(ngModel)]="user.name" name="name" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" [(ngModel)]="user.email" name="email" required>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" [(ngModel)]="user.password" name="password" required>
            </div>

            <!-- Role Dropdown -->
            <div class="mb-3">
              <label class="form-label">Role</label>
              <select class="form-select" [(ngModel)]="user.role" name="role" (change)="onRoleChange()" required>
                <option value="">Select Role</option>
                <option value="Patient">Patient</option>
                <option value="Doctor">Doctor</option>
              </select>
            </div>

            <!-- Specialization (only for Doctor) -->
            <div class="mb-3" *ngIf="showSpecialization">
              <label class="form-label">Specialization</label>
              <input type="text" class="form-control" [(ngModel)]="user.specialization" name="specialization">
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100">Register</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
