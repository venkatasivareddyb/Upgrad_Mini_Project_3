<div class="container mt-4">
  <h2 class="text-primary mb-4">Validate Doctors</h2>

  <div class="row" *ngIf="doctors.length > 0; else noDoctors">
    <div class="col-md-6 mb-3" *ngFor="let doc of doctors">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">{{ doc.name }}</h5>
          <p class="card-text">Specialization: {{ doc.specialization }}</p>
          <p class="card-text">Validated: {{ doc.validated ? 'Yes' : 'No' }}</p>

          <button class="btn btn-success"
                  (click)="validateDoctor(doc)"
                  [disabled]="doc.validated">
            Validate Doctor
          </button>
        </div>
      </div>
    </div>
  </div>

  <ng-template #noDoctors>
    <p class="text-muted">No doctors available for validation.</p>
  </ng-template>
</div>
