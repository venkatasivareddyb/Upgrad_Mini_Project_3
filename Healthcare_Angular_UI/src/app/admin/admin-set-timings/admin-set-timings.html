<div class="container mt-4">
  <h2 class="text-primary mb-4">Set Doctor Timings</h2>

  <div class="row" *ngIf="doctors.length > 0; else noDoctors">
    <div class="col-md-6 mb-3" *ngFor="let doc of doctors">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">{{ doc.name }}</h5>
          <p class="card-text">Specialization: {{ doc.specialization }}</p>

          <button class="btn btn-success me-2" (click)="setDefaultTimings(doc)">
            Set Default Timings (10–2, 4–9)
          </button>

          <!-- Update timings form -->
          <div class="mt-3">
            <label>Morning Shift:</label>
            <input type="text" #morning class="form-control mb-2" placeholder="e.g. 09:00-13:00">
            <label>Evening Shift:</label>
            <input type="text" #evening class="form-control mb-2" placeholder="e.g. 15:00-20:00">
            <button class="btn btn-info"
                    (click)="updateTimings(doc, morning.value, evening.value)">
              Update Timings
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #noDoctors>
    <p class="text-muted">No doctors available.</p>
  </ng-template>
</div>
