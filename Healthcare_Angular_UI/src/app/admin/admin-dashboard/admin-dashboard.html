<div class="container mt-4">
  <h2 class="text-primary mb-4">Admin Dashboard</h2>

  <!-- Doctor List -->
  <h4 class="mb-3">Doctors</h4>
  <div class="row" *ngIf="doctors.length > 0; else noDoctors">
    <div class="col-md-6 mb-3" *ngFor="let doc of doctors">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">{{ doc.name }}</h5>
          <p class="card-text">Specialization: {{ doc.specialization }}</p>
          <p class="card-text">Validated: {{ doc.validated ? 'Yes' : 'No' }}</p>

          <button class="btn btn-primary me-2" (click)="viewDoctorAppointments(doc, todayDate)">
            View Today’s Patients
          </button>
          <button
            class="btn btn-secondary me-2"
            (click)="viewDoctorAppointments(doc, yesterdayDate)"
          >
            View Yesterday’s Patients
          </button>

          <button class="btn btn-info" (click)="viewDoctorAppointments(doc, tomorrowDate)">
            View Tomorrow’s Patients
          </button>
        </div>
      </div>
    </div>
  </div>
  <ng-template #noDoctors>
    <p class="text-muted">No doctors available.</p>
  </ng-template>

  <!-- Doctor Appointments -->
  <div class="mt-4" *ngIf="selectedDoctor">
    <h4 class="mb-3">Appointments for {{ selectedDoctor.name }}</h4>
    <ul class="list-group">
      <li class="list-group-item" *ngFor="let appt of doctorAppointments">
        Patient ID: {{ appt.patientId }} | Date: {{ appt.date }} | Time: {{ appt.time }}
      </li>
    </ul>
  </div>
</div>
